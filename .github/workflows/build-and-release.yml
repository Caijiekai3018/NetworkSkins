name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '8.0.x'
        
    - name: Setup Cities Skylines References
      shell: pwsh
      run: |
        # Create libs directory
        New-Item -ItemType Directory -Force -Path "libs"
        
        # Download required assemblies from a reliable source
        $files = @(
          @{name="Assembly-CSharp.dll"; url="https://github.com/kianzarrin/UnifiedUI/raw/master/lib/Assembly-CSharp.dll"},
          @{name="ColossalManaged.dll"; url="https://github.com/kianzarrin/UnifiedUI/raw/master/lib/ColossalManaged.dll"},
          @{name="ICities.dll"; url="https://github.com/kianzarrin/UnifiedUI/raw/master/lib/ICities.dll"},
          @{name="UnityEngine.dll"; url="https://github.com/kianzarrin/UnifiedUI/raw/master/lib/UnityEngine.dll"}
        )
        
        foreach ($file in $files) {
          try {
            Write-Host "Downloading $($file.name)..."
            Invoke-WebRequest -Uri $file.url -OutFile "libs/$($file.name)" -ErrorAction Stop
            Write-Host "Successfully downloaded $($file.name)"
          } catch {
            Write-Host "Warning: Could not download $($file.name): $_"
          }
        }
        
    - name: Update project references
      shell: pwsh
      run: |
        $csprojPath = "NetworkSkins/NetworkSkins.csproj"
        $content = Get-Content $csprojPath -Raw
        $content = $content -replace 'C:\\References\\', '${{ github.workspace }}\libs\'
        Set-Content -Path $csprojPath -Value $content
        
    - name: Restore dependencies
      run: dotnet restore NetworkSkins.sln
      
    - name: Build
      run: dotnet build NetworkSkins/NetworkSkins.csproj -c Release --no-restore
      
    - name: Prepare release files
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "release"
        Copy-Item "NetworkSkins/bin/Release/net35/NetworkSkins.dll" "release/"
        
        # Copy locale files if they exist
        if (Test-Path "NetworkSkins/bin/Release/net35/Locale") {
          Copy-Item "NetworkSkins/bin/Release/net35/Locale/*" "release/" -Recurse
        }
        
        # Copy CitiesHarmony dependency
        if (Test-Path "NetworkSkins/bin/Release/net35/CitiesHarmony.API.dll") {
          Copy-Item "NetworkSkins/bin/Release/net35/CitiesHarmony.API.dll" "release/"
        }
        
    - name: Create Release Archive
      shell: pwsh
      run: |
        Compress-Archive -Path "release/*" -DestinationPath "NetworkSkins-Release.zip"
        
    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: NetworkSkins-Build
        path: release/
        
    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          NetworkSkins-Release.zip
        body: |
          ## NetworkSkins Release ${{ github.ref_name }}
          
          This release contains the compiled NetworkSkins mod for Cities: Skylines.
          
          ### Installation
          1. Download `NetworkSkins-Release.zip`
          2. Extract to your Cities: Skylines mods folder: `%LOCALAPPDATA%\Colossal Order\Cities_Skylines\Addons\Mods\NetworkSkins`
          3. Enable the mod in the game
          
          ### Files Included
          - NetworkSkins.dll - Main mod file
          - CitiesHarmony.API.dll - Harmony API dependency
          - Locale files - Translation files (if any)
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
